<!DOCTYPE html>
<html lang="ru">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://code.jquery.com/jquery-3.6.0.min.js "></script>
<script src="/static/js/products.js"></script>
<script src="/static/js/jquery.noisy.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
</head>

<body>

    {% block content %}
    <div class="card-item-container"></div>

    {% include 'header.html' %}
    
    <div class="shop-grid">
        {% for item in products %}
        <article data-id="{{ item.sku }}" data-collection="{{ item.collection }}" class="shop-item" >
            <img class="item-img-blur" src="{{ url_for('static', filename='img/' + item.sku + '/' + item.sku + '-main.webp') }}" alt="" srcset="">
            <img class="item-img" src="{{ url_for('static', filename='img/' + item.sku + '/' + item.sku + '-main.webp') }}" alt="" srcset="">
            <p class="item-name center goudy">{{ item.name }}</p>
        </article>

        {% endfor %}

    </div>
    <div class="fixed">
            <div id="product-detail" class="card-item-container"></div>
    </div>

    {% endblock %}

    <script>
        $(document).ready(function() {
            // Обработчик клика на букву
            $('.letter').on('click', function() {
                const selectedCollection = $(this).data('collection');
                const $allItems = $('.shop-item');
                const delayStep = 20; // 0.1 секунды в миллисекундах
                
                // 1. Анимация улетания меню
                $('.letter-box').css('transform', 'translateY(-100vh)');
                
                // 2. Постепенное скрытие несоответствующих товаров
                $allItems.each(function(index) {
                    const $item = $(this);
                    const itemCollection = $item.data('collection');
                    
                    setTimeout(() => {
                        if (selectedCollection && itemCollection !== selectedCollection) {
                            $item.hide(); // Плавное скрытие
                        } else {
                            $item.show(); // Показываем подходящие (на случай повторного клика)
                        }
                    }, index * delayStep);
                });
                
                // 3. Возврат меню через время
                setTimeout(() => {
                    $('.letter-box').css('transform', 'translateY(0)');
                }, 1000);
            });
            
            // Кнопка "Показать все" с поэтапным появлением
            $('#show-all').on('click', function() {
                const $hiddenItems = $('.shop-item:hidden');
                const delayStep = 30;
                
                $hiddenItems.each(function(index) {
                    setTimeout(() => {
                        $(this).fadeIn(0);
                    }, index * delayStep);
                });
            });
        });
    </script>
