


<div id="item-card" class="item-card" data-collection-color="{{ collections_colors[product.collection] }}" style="background-color: {{ collections_colors[product.collection] }}; box-shadow:
    0px 0px 50px 10px {{  collections_colors[product.collection]  }};">
    <div class="card-name-line">
        <h3 class="card-name goudy">{{ product.name }}</h3>
        <button id="card_close" class="modal-btn exit"></button>
    </div>
    <div class="item-card-inner">
        <div class="card-img-box">
            <div class="card-share" style="background-color: {{ collections_colors[product.collection] }} ;">
                <img src="/static/icons/share.svg" alt="">
            </div>
            <img class="card-thumbnail" src="{{ url_for('static', filename='img/' + product.sku + '/' + product.sku + '-main.webp') }}" alt="" class="card-main-image">
            <img class="icon-coll" src="{{  url_for('static', filename='icons/colls/' ~ product.collection|lower ~ '.svg') }}" alt="">
        </div>
        
        <div class="card-scrolling-box" style="background-color: {{ collections_colors[product.collection] }} ;">
            <div class="thumbnails-inner">
                {% if img_list %}
                    {% for img in img_list %}
                        <img src="{{ url_for('static', filename='img/' + product.sku + '/' + img) }}" 
                            alt="Фото товара" 
                            class="carousel-img">
                    {% endfor %}
                {% else %}
                    <p>Нет доступных фотографий</p>
                {% endif %}
            </div>
        </div>
        
        <div class="grid-container">
            <div class="grid-item"><img src="/static/icons/dimension.svg"></div>
            <div class="grid-item-text"><p>{{ product.Height }}x{{ product.Width }} мм</p></div>
            <div class="grid-item"><img src="/static/icons/weight.svg"></div>
            <div class="grid-item-text"><p>{{ product.Weight }} гр</p></div>
            <div class="grid-item"><img src="/static/icons/material.svg"></div>
            <div class="grid-item-text card-info-text-flex"><p class="p-st card-grid-material">{{ product.material }}</p></div>
          </div>
        <div class="card-line"  style="background-color: {{ collections_colors[product.collection] }} ;">
            <p class="card-collection gothic_bold">Коллекция «{{ product.collection }}»</p>

            <div class="card-line-circle">
                <img src="/static/icons/dot.svg" alt="">
            </div>
        </div>
        <div class="card-text">
            <p id="card_description" class="gothic card-description">{{ product.short_description }}</p>
        </div>
    </div>
    <div id="card_showmore" class="card-showmore">
        <img src="/static/icons/line.svg" alt="">
    </div>
</div>

<script src="/static/js/card_parallax.js"></script>


<script>
if ($(window).width() <= 760) {
    $(document).ready(function () {
        const $card = $('#item-card');
        const $styleTag = $('<style>').appendTo('head');
        
        // Переменные для сглаживания
        let lastBeta = 0;
        let lastGamma = 0;
        let lastUpdate = 0;
        const SMOOTHING_FACTOR = 0.2; // Коэффициент сглаживания (0.1-0.3)
        const UPDATE_INTERVAL = 16; // ~60fps (1000/60 ≈ 16ms)
        
        // Предварительные стили для хардварного ускорения
        $card.css({
            'will-change': 'box-shadow',
            'transform': 'translateZ(0)' // Активируем GPU acceleration
        });
        
        // Функция для сглаживания значений
        function smoothValue(current, last) {
            return last + (current - last) * SMOOTHING_FACTOR;
        }
        
        // Обработчик гироскопа с троттлингом и сглаживанием
        function handleOrientation(event) {
            const now = Date.now();
            if (now - lastUpdate < UPDATE_INTERVAL) return;
            lastUpdate = now;
            
            const beta = event.beta || 0;
            const gamma = event.gamma || 0;
            
            // Сглаживаем значения
            lastBeta = smoothValue(beta, lastBeta);
            lastGamma = smoothValue(gamma, lastGamma);
            
            // Используем requestAnimationFrame для плавности
            requestAnimationFrame(() => {
                const lp = 50 + (lastGamma * 0.5);
                const tp = 50 + (lastBeta * 0.3);
                const intensity = 1 + (Math.abs(lastBeta) + Math.abs(lastGamma)) / 180;
                const p_opc = Math.min(70, intensity * 50);
                
                $styleTag.html(`
                    #item-card::before {
                        background-position: ${lp}% ${tp}%;
                        opacity: ${0.2 + intensity * 0.3};
                    }
                    #item-card::after {
                        background-position: ${50 + (lp-50)/2}% ${50 + (tp-50)/2}%;
                        opacity: ${p_opc / 100};
                    }
                `);
                
                const foilIntensity = Math.min(0.5, intensity * 0.2);
                $card.css('box-shadow', `0 0 ${20 * intensity}px ${foilIntensity}px rgba(255,255,255,0.5)`);
            });
        }
        
        // Проверяем поддержку гироскопа
        if (window.DeviceOrientationEvent) {
            // Используем passive event listener для оптимизации
            window.addEventListener('deviceorientation', handleOrientation, { 
                passive: true 
            });
        } else {
            $styleTag.html(`
                #item-card::before, #item-card::after {
                    opacity: 0.2 !important;
                }
            `);
        }
        
        // Оптимизированный обработчик для кнопки
        $('#card_showmore').on('click', function () {
            const $desc = $('#card_description');
            const isExpanded = $desc.height() > 105;
            
            requestAnimationFrame(() => {
                $desc.css({
                    height: isExpanded ? '105px' : $desc[0].scrollHeight + 'px'
                });
                $(this).css({
                    transform: isExpanded ? 'rotate(0deg)' : 'rotate(180deg)',
                    bottom: isExpanded ? '' : '-30px'
                });
            });
        });
    });
}
</script>
